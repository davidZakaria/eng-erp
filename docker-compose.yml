services:
  postgres:
    image: postgres:16
    container_name: eng-njd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eng_njd
      POSTGRES_PASSWORD: eng_njd_secret
      POSTGRES_DB: eng_njd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: eng-njd-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: eng-njd-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 admin password123;
      mc mb --ignore-existing local/eng-njd-documents;
      mc mb --ignore-existing local/cad-files;
      mc mb --ignore-existing local/backups;
      exit 0;
      "
    volumes:
      - ./docker/minio-cors.json:/tmp/cors.json:ro

volumes:
  postgres_data:
  minio_data:
