# Full Eng-NJD host nginx config AFTER Let's Encrypt cert exists.
# Replace eng-njd.duckdns.org if you use a different PUBLIC_HOST.
# Apply: sudo cp deploy/nginx/host-snippet.ssl.conf /etc/nginx/sites-available/eng-njd

server {
  listen 80;
  listen [::]:80;
  server_name eng-njd.duckdns.org;
  add_header Content-Security-Policy "upgrade-insecure-requests" always;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name eng-njd.duckdns.org;

  ssl_certificate /etc/letsencrypt/live/eng-njd.duckdns.org/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/eng-njd.duckdns.org/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 512m;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "upgrade-insecure-requests" always;

  location /s3/ {
    proxy_pass http://127.0.0.1:19000/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 0;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location / {
    proxy_pass http://127.0.0.1:13000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    client_max_body_size 512m;
  }
}
