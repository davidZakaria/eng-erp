# Add this as a NEW site in your EXISTING host nginx (do not replace other projects).
# NEVER copy deploy/nginx/nginx.conf or nginx.conf.template to sites-enabled — they use catch-all server_name.
# Replace eng-njd.duckdns.org and ports if you changed ENG_NJD_* in deploy/vps.env

server {
  listen 80;
  server_name eng-njd.duckdns.org;

  client_max_body_size 512m;

  # CAD / document uploads (MinIO via Eng-NJD stack on localhost:19000)
  location /s3/ {
    proxy_pass http://127.0.0.1:19000/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 0;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Next.js app (Eng-NJD web container on localhost:13000)
  location / {
    proxy_pass http://127.0.0.1:13000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

# After certbot on the host (same as your other sites):
#   certbot --nginx -d eng-njd.duckdns.org
